<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sultan Plaza — Администратор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --gold: #c4a44a;
      --gold-light: #d4b45a;
      --gold-dim: rgba(196, 164, 74, .12);
      --gold-border: rgba(196, 164, 74, .3);
      --bg-card: rgba(255, 255, 255, .07);
      --bg-card-hover: rgba(255, 255, 255, .11);
      --border: rgba(255, 255, 255, .1);
      --border-gold: rgba(196, 164, 74, .3);
      --text: #f0ece4;
      --text-2: rgba(240, 236, 228, .7);
      --text-3: rgba(240, 236, 228, .45);
      --red: #e07070;
      --green: #5ec98a;
      --blur: blur(20px) saturate(1.3);
      --blur-sm: blur(12px);
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 28px;
      --safe: env(safe-area-inset-bottom, 0px);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background-image: url("backx.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      padding-bottom: calc(40px + var(--safe));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: rgba(0, 0, 0, .68);
    }

    /* ── HEADER ── */
    .admin-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 8, 5, .75);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      transition: all .22s ease;
      flex-shrink: 0;
    }
    .back-btn:hover { background: var(--bg-card-hover); color: var(--text); border-color: var(--gold-border); }

    .admin-header-title {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: .2px;
    }

    /* ── TABS ── */
    .admin-tabs-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 0;
      padding: 18px 18px 0;
    }

    .admin-tab {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 10px;
      cursor: pointer;
      transition: all .22s ease;
      letter-spacing: .2px;
    }
    .admin-tab:first-child { border-radius: var(--r-sm) 0 0 var(--r-sm); border-right: none; }
    .admin-tab:last-child  { border-radius: 0 var(--r-sm) var(--r-sm) 0; }
    .admin-tab.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-color: var(--gold);
      color: #1a1206;
      font-weight: 700;
    }

    /* ── CONTENT AREAS ── */
    .admin-content { position: relative; z-index: 1; padding: 18px 18px 0; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 14px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: all .22s ease;
      white-space: nowrap;
    }
    .filter-chip.active {
      background: var(--gold-dim);
      border-color: var(--gold-border);
      color: var(--gold);
    }
    .filter-chip:hover:not(.active) { background: var(--bg-card-hover); color: var(--text); }

    /* ── RECEIPT CARDS ── */
    .receipts-list { display: flex; flex-direction: column; gap: 12px; }

    .receipt-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      overflow: hidden;
      transition: border-color .22s ease;
    }
    .receipt-card:hover { border-color: var(--gold-border); }

    .receipt-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .receipt-head-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .receipt-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
    }

    .receipt-meta { min-width: 0; }
    .receipt-meta-top {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .receipt-meta-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .receipt-time {
      font-size: 12px;
      color: var(--text-3);
      flex-shrink: 0;
      text-align: right;
    }
    .receipt-time .receipt-date { font-size: 11px; color: var(--text-3); }

    .receipt-body { padding: 12px 16px; }

    .receipt-item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
      color: var(--text-2);
      border-bottom: 1px dashed rgba(255,255,255,.06);
    }
    .receipt-item-row:last-child { border-bottom: none; }
    .receipt-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .receipt-item-qty { color: var(--text-3); flex-shrink: 0; font-size: 12px; }
    .receipt-item-price { flex-shrink: 0; font-weight: 600; }

    .receipt-foot {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }
    .receipt-foot-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-2);
      padding: 3px 0;
    }
    .receipt-foot-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .receipt-foot-total-label { font-size: 14px; font-weight: 700; color: var(--text); }
    .receipt-foot-total-val {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    .receipt-del-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border: 1px solid rgba(224, 112, 112, .25);
      background: transparent;
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all .22s ease;
      opacity: .7;
    }
    .receipt-del-btn:hover { background: rgba(224, 112, 112, .1); opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-receipts {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
      font-size: 14px;
    }
    .empty-receipts .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .5; }
    .empty-receipts p { font-style: italic; }

    /* ── STATISTICS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    @media(min-width: 500px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px 14px;
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      text-align: center;
    }
    .stat-card.accent { border-color: var(--gold-border); background: var(--gold-dim); }

    .stat-label { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
    }
    .stat-value.small { font-size: 17px; }
    .stat-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    .stats-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-2);
      margin: 18px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── DAY BARS ── */
    .day-bars { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .day-bar-row { display: flex; align-items: center; gap: 10px; }
    .day-bar-label { font-size: 12px; color: var(--text-2); width: 40px; flex-shrink: 0; font-weight: 600; }
    .day-bar-wrap { flex: 1; background: rgba(255,255,255,.06); border-radius: 4px; height: 22px; overflow: hidden; }
    .day-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--gold-light));
      border-radius: 4px;
      min-width: 4px;
      transition: width .5s cubic-bezier(.22,1,.36,1);
      display: flex;
      align-items: center;
      padding-right: 6px;
      justify-content: flex-end;
    }
    .day-bar-fill-val { font-size: 10px; font-weight: 700; color: rgba(0,0,0,.6); white-space: nowrap; }
    .day-bar-val { font-size: 12px; color: var(--text-3); width: 80px; text-align: right; flex-shrink: 0; }

    /* ── CLEAR ALL BTN ── */
    .clear-all-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid rgba(224, 112, 112, .3);
      background: transparent;
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all .22s ease;
      margin-bottom: 20px;
    }
    .clear-all-btn:hover { background: rgba(224, 112, 112, .1); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="admin-header">
    <a href="index.html" class="back-btn">&#8592; Меню</a>
    <span class="admin-header-title">Sultan Plaza — Admin</span>
  </header>

  <!-- Tabs -->
  <div class="admin-tabs-wrap">
    <button class="admin-tab active" id="tab-receipts" onclick="switchTab('receipts')">Чеки</button>
    <button class="admin-tab" id="tab-stats" onclick="switchTab('stats')">Статистика</button>
  </div>

  <!-- Content -->
  <div class="admin-content">

    <!-- RECEIPTS TAB -->
    <section class="admin-section active" id="section-receipts">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-chip active" data-filter="all"   onclick="setFilter('all')">Все</button>
        <button class="filter-chip"        data-filter="today"     onclick="setFilter('today')">Сегодня</button>
        <button class="filter-chip"        data-filter="yesterday" onclick="setFilter('yesterday')">Вчера</button>
        <button class="filter-chip"        data-filter="week"      onclick="setFilter('week')">Эта неделя</button>
      </div>
      <div class="receipts-list" id="receipts-list"></div>
      <button class="clear-all-btn" onclick="clearAllReceipts()">Удалить все чеки</button>
    </section>

    <!-- STATS TAB -->
    <section class="admin-section" id="section-stats">
      <div class="stats-grid" id="stats-grid">
        <!-- filled by JS -->
      </div>
      <div class="stats-section-title">Выручка по дням (последние 7 дней)</div>
      <div class="day-bars" id="day-bars"></div>
    </section>

  </div>

  <script src="admin.js"></script>
</body>
</html>
