<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sultan Plaza — Menu</title>

  <!-- Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="menu-page">

  <!-- Header -->
  <header>
    <div class="logo-area">
      <img src="logo.png" alt="Sultan Plaza" class="site-logo" id="site-logo-secret">

      <div class="lang-switch">
        <button class="lang-btn" data-lang="kz" onclick="setLang('kz')">KZ</button>
        <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">ENG</button>
      </div>
    </div>

    <!-- Top tabs injected here -->

    <div class="categories" id="category-filters">
      <!-- Injected via JS -->
    </div>
  </header>

  <!-- Search -->
  <div class="search-container" id="menu-controls-panel" role="region" aria-label="Поиск по меню">
    <input type="text" id="search-input" class="search-input"
      placeholder="Поиск по меню..."
      aria-label="Поиск" autocomplete="off" oninput="filterMenu()">
  </div>

  <!-- Menu Grid -->
  <div class="menu-grid" id="menu-container"></div>

  <!-- Backdrop (not used, kept for compat) -->
  <div class="menu-backdrop" id="menu-backdrop" hidden aria-hidden="true"></div>

  <!-- Scroll to top -->
  <button id="scroll-top-btn" aria-label="Наверх" onclick="scrollToTop()">↑</button>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="btn-order-main" onclick="openCartModal()">
      <span id="btn-order-text">Заказать</span>
      <span id="btn-order-badge" class="badge" style="display:none;">0</span>
    </button>
  </div>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cart-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="cart-title">Ваш заказ</span>
        <button class="close-btn" onclick="closeModal('cart-modal')">&times;</button>
      </div>
      <div id="cart-items-list"></div>
      <div class="cart-service-row">
        <span id="cart-service-label">Обслуживание (15%):</span>
        <span id="cart-service-amount">0 ₸</span>
      </div>
      <div class="cart-total">
        <span id="cart-total-label">Итого:</span>
        <span id="cart-total-price">0 ₸</span>
      </div>
      <div class="receipt-inputs">
        <input id="receipt-table" class="receipt-input" type="text" placeholder="Стол №" maxlength="10" autocomplete="off">
        <input id="receipt-waiter" class="receipt-input" type="text" placeholder="Официант" maxlength="30" autocomplete="off">
      </div>
      <button class="btn-action-full btn-primary" onclick="openConfirmModal()" style="margin-top:6px;">
        <span id="btn-checkout-text">Оформить заказ</span>
      </button>
      <button class="btn-action-full btn-save-receipt" onclick="saveReceipt()">
        Сохранить чек
      </button>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-content" style="text-align:center;">
      <div class="modal-header" style="justify-content:center;">
        <span class="modal-title" id="confirm-title">Подтверждение</span>
      </div>
      <p id="confirm-message" style="margin-bottom:24px;color:var(--text-2);">Позвонить на 600 и оформить заказ?</p>
      <button class="btn-action-full btn-primary" onclick="processOrder()">
        <span id="btn-confirm-yes">Да, позвонить</span>
      </button>
      <button class="btn-action-full btn-secondary" onclick="closeModal('confirm-modal')">
        <span id="btn-confirm-no">Назад</span>
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="menu.js"></script>
  <script src="app.js"></script>
  <script src="menu_i18n_fix.js"></script>

  <!-- Extra enhancements -->
  <script>
    // ── Secret admin access (5 taps on logo within 3 sec) ─
    (function() {
      const logo = document.getElementById('site-logo-secret');
      if (!logo) return;
      let taps = 0, timer = null;
      logo.addEventListener('click', function() {
        taps++;
        clearTimeout(timer);
        if (taps >= 5) { window.location.href = 'admin.html'; return; }
        timer = setTimeout(function() { taps = 0; }, 3000);
      });
    })();

    // ── Scroll-to-top button ──────────────────────────────
    const _scrollBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      _scrollBtn.classList.toggle('visible', window.scrollY > 320);
    }, { passive: true });
    window.scrollToTop = function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ── Toast helper ──────────────────────────────────────
    window.showToast = function(msg, type) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const el = document.createElement('div');
      el.className = 'toast' + (type ? ' ' + type : '');
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 2100);
    };

    // ── Add-to-cart visual feedback ───────────────────────
    const _origAdd = window.addToCart;
    if (_origAdd) {
      // patch after scripts load
    }
    window.addEventListener('load', () => {
      const orig = window.addToCart;
      if (orig) {
        window.addToCart = function(id) {
          orig(id);
          const lang = window.currentLang || 'ru';
          const msgs = { ru: '✓ Добавлено', kz: '✓ Қосылды', en: '✓ Added' };
          showToast(msgs[lang] || msgs.ru, 'success');
        };
      }
    });
  </script>
</body>
</html>
